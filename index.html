<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Love</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #0b0b0b; /* Dark TikTok aesthetic */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: white;
        }

        /* Floating Hearts Background */
        .background {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* The Love Card */
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            animation: fadeIn 2s ease-in;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #ff4d4d;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #e0e0e0;
        }

        .heart {
            color: #ff4d4d;
            font-size: 50px;
            margin-bottom: 20px;
            animation: beat 1.2s infinite;
        }

        @keyframes beat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="heart">❤️</div>
        <h1>I Love You</h1>
        <p>Every moment with you is a gift.<br> 
        You are my favorite person, today and always.</p>
    </div>

</body>
</html>
